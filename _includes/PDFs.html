<div class="page__posts">
    {% for element in page.PDFs %}
    <a href="{{ element.Link }}">
        <div class="posts__post">
            <div class="posts__img">
                <img src="{{ element.ImgSrc }}/dist/images/icons/pdf.png" alt="" />
            </div>
            <div class="posts__name">
                {{ element.Name }}
            </div>
        </div>
    </a>
    {% endfor %}
</div>
