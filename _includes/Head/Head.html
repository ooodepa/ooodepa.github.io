<head>
    {% include Head/Meta/Meta.html %}
    <title>{{ page.title }} | {{ site.title }}</title>
    {% include Head/Favicons/Favicons.html %}
    <script src="{{ site.baseurl }}/dist/libs/jquery/jquery.min.js"></script>
    {% if jekyll.environment == "production" %}
        <link rel="stylesheet" href="{{ site.baseurl }}/dist/styles.css?ver={{ site.time | date: '%Y-%m-%d_%H-%M' }}">
        <script src="{{ site.baseurl }}/dist/main.js?ver={{ site.time | date: '%Y-%m-%d_%H-%M' }}"></script>
    {% else %}
        <link rel="stylesheet" href="{{ site.baseurl }}/dist/styles.css">
        <script src="{{ site.baseurl }}/dist/main.js"></script>
    {% endif %}
    <link rel="stylesheet" href="{{ site.baseurl }}/dist/libs/bootstrap/dist/css/bootstrap.min.css" />
    <script src="{{ site.baseurl }}/dist/libs/bootstrap/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="{{ site.baseurl }}/dist/libs/fontawesome-free-5.9.0-web/css/all.min.css" />
</head>
