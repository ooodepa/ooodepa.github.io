---
layout: Page/Page
title: Продукция
description: Продукция
permalink: products/
---

<div class="page__posts">
{% for element in site.data.products.products %}
    <a href="{{ element.Link }}">
        <div class="posts__post">
            <div class="posts__img">
                <img src="{{ element.ImgSrc }}" alt="{{ element.ImgAlt }}" />
            </div>
            <div class="posts__name">
                {{ element.Name }}
            </div>
        </div>
    </a>
{% endfor %}
</div>
