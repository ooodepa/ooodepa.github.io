---
layout: Page/Page
title: Каталоги
description: Каталоги
permalink: katalogs/
---

<div class="page__posts">
    {% for element in site.data.katalogs.katalogs %}
    <a href="{{ element.Link }}">
        <div class="posts__post">
            <div class="posts__img">
                <img src="{{ element.ImgSrc }}" alt="{{ element.ImgAlt }}" />
            </div>
            <div class="posts__name">
                {{ element.Name }}
            </div>
        </div>
    </a>
    {% endfor %}
</div>
